# SonarCloud configuration for Bilbo

sonar.projectKey=Prekzursil_bilbo-app
sonar.organization=Prekzursil

sonar.projectName=Bilbo
sonar.projectVersion=1.0

sonar.sources=shared/src/commonMain,androidApp/src/main
sonar.tests=shared/src/commonTest,androidApp/src/test,androidApp/src/androidTest

sonar.kotlin.detekt.reportPaths=shared/build/reports/detekt/detekt.xml,androidApp/build/reports/detekt/detekt.xml

sonar.coverage.jacoco.xmlReportPaths=androidApp/build/reports/coverage/androidTest/playstore/debug/report.xml

sonar.sourceEncoding=UTF-8

sonar.exclusions=\
  **/*.generated.kt,\
  **/build/**,\
  **/*.sq,\
  **/*.sqm,\
  **/res/**,\
  **/test/**,\
  **/androidTest/**
