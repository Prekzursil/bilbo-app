name: Shared Module Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-tests:
    name: Run KMP Shared Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run shared module tests
        run: ./gradlew :shared:allTests --no-daemon

      - name: Generate Kover coverage report
        run: ./gradlew :shared:koverXmlReport --no-daemon
        if: always()

      - name: Verify 100% coverage
        run: ./gradlew :shared:koverVerify --no-daemon
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: shared-test-results
          path: shared/build/reports/tests/
          retention-days: 7

      - name: Upload Kover coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: kover-coverage-report
          path: shared/build/reports/kover/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: shared/build/reports/kover/report.xml
          flags: shared
          fail_ci_if_error: false
