name: Shared Module Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-tests:
    name: Run KMP Shared Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run shared module tests
        run: ./gradlew :shared:allTests --no-daemon

      - name: Generate Kover coverage report
        run: ./gradlew :shared:koverXmlReport --no-daemon
        if: always()

      - name: Verify 100% coverage
        run: ./gradlew :shared:koverVerify --no-daemon
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: shared-test-results
          path: shared/build/reports/tests/
          retention-days: 7

      - name: Upload Kover coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: kover-coverage-report
          path: shared/build/reports/kover/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: shared/build/reports/kover/report.xml
          flags: shared
          fail_ci_if_error: false
