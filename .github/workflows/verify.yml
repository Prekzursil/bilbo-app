name: Verify

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
      - name: Set up Node (jscpd duplication check)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install lizard (complexity)
        run: pipx install lizard || pip install --user lizard
      - run: bash scripts/verify
