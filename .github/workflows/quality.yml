name: Quality Gate

# Lean quality gate — the single required check for `main`.
# Consolidates the six lean gates (replaces the retired Sonar/Codecov/DeepSource
# SaaS control plane):
#   1. lint + format + sec-lint  -> Android Lint (gating) + Semgrep CE (SAST job)
#   2. types                     -> Kotlin compile via Gradle test/build tasks
#   3. tests + 100% coverage     -> :shared:allTests + :shared:koverVerify (100% line+branch)
#                                   + :androidApp unit tests
#   4. SAST                      -> Semgrep CE (.semgrep.yml)
#   5. secrets                   -> gitleaks (.gitleaks.toml) + GitHub push protection
#   6. deps                      -> OSV-Scanner + Dependabot
#
# CodeQL code-scanning runs in its own scheduled workflow (codeql.yml).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - run: chmod +x gradlew
      - name: Android Lint
        run: ./gradlew :androidApp:lintPlaystoreDebug --no-daemon

  tests-coverage:
    name: Tests + 100% Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - run: chmod +x gradlew
      - name: Shared module tests
        run: ./gradlew :shared:allTests --no-daemon
      - name: Verify 100% line+branch coverage (Kover)
        run: ./gradlew :shared:koverVerify --no-daemon
      - name: Android unit tests
        run: ./gradlew :androidApp:testPlaystoreDebugUnitTest --no-daemon

  sast:
    name: SAST (Semgrep CE)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Install Semgrep CE
        run: pipx install semgrep
      - name: Run Semgrep
        run: semgrep --config=.semgrep.yml --error --metrics=off

  secrets:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Scan for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner

  deps:
    name: Deps (OSV-Scanner)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Install OSV-Scanner
        run: |
          url=$(curl -s https://api.github.com/repos/google/osv-scanner/releases/latest \
            | grep -o 'https://[^"]*osv-scanner[^"]*linux_amd64[^"]*' \
            | grep -v -e sha256 -e '\.sig' | head -1)
          curl -sSfL "$url" -o osv-scanner && chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/
      - name: Scan dependencies
        # OSV-Scanner scans any lockfiles/SBOMs it can parse. This repo declares
        # Gradle deps via a version catalog (gradle/libs.versions.toml), which
        # OSV cannot parse as a lockfile, and commits no gradle.lockfile, so OSV
        # legitimately finds no package sources here. --allow-no-lockfiles makes
        # that a pass rather than a hard error; Dependabot (the other half of the
        # lean deps gate) is the substantive Gradle/npm/actions vuln scanner.
        run: osv-scanner scan source -r . --allow-no-lockfiles

  quality:
    name: quality
    runs-on: ubuntu-latest
    needs: [lint, tests-coverage, sast, secrets, deps]
    steps:
      - name: All lean gates passed
        run: echo "Lean quality gate green - lint, tests/coverage, SAST, secrets, deps."
