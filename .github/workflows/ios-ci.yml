name: iOS CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-kotlin-framework:
    name: Build Kotlin Shared XCFramework
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Shared XCFramework (Debug)
        run: ./gradlew :shared:assembleSharedDebugXCFramework --no-daemon

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Shared-debug-xcframework
          path: shared/build/XCFrameworks/debug/
          retention-days: 7

  swiftlint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        working-directory: iosApp
        run: swiftlint --strict
        continue-on-error: true

  build-ios-app:
    name: Build iOS App
    runs-on: macos-14
    timeout-minutes: 60
    needs: [build-kotlin-framework]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Shared XCFramework
        run: ./gradlew :shared:assembleSharedDebugXCFramework --no-daemon

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate iosApp.xcodeproj
        working-directory: iosApp
        run: xcodegen generate

      - name: Build iOS app (simulator)
        working-directory: iosApp
        run: |
          set -o pipefail
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty

      - name: Package unsigned iOS .app bundle
        working-directory: iosApp
        run: |
          set -e
          APP_PATH=$(find build/Build/Products -maxdepth 4 -type d -name 'iosApp.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::iosApp.app bundle not found after build"
            find build -maxdepth 4 -type d || true
            exit 1
          fi
          mkdir -p release-artifacts
          # Preserve symlinks inside the .app bundle with -y
          (cd "$(dirname "$APP_PATH")" && zip -ry "../../../../release-artifacts/Bilbo-iOS-unsigned.zip" "$(basename "$APP_PATH")")
          ls -la release-artifacts/

      - name: Upload iOS app artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Bilbo-iOS-unsigned
          path: iosApp/release-artifacts/Bilbo-iOS-unsigned.zip
          retention-days: 14
          if-no-files-found: warn

      # Unit tests are disabled until an actual test target is added to project.yml.
      # The CI just needs to produce a valid unsigned .app artifact for the release.

  attach-ios-release-artifact:
    name: Attach iOS build to GitHub Release
    runs-on: ubuntu-latest
    needs: [build-ios-app]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download iOS app zip
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Bilbo-iOS-unsigned
          path: release-artifacts/

      - name: List downloaded artifacts
        run: ls -la release-artifacts/ || true

      - name: Attach iOS zip to release ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f release-artifacts/Bilbo-iOS-unsigned.zip ]; then
            gh release upload "${{ github.ref_name }}" \
              release-artifacts/Bilbo-iOS-unsigned.zip \
              --clobber
          else
            echo "::warning::iOS zip artifact was not produced; skipping release upload."
          fi
