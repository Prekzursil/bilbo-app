name: Android CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew :androidApp:lintPlaystoreDebug --no-daemon
        continue-on-error: true

      - name: Upload Lint results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: lint-results
          path: androidApp/build/reports/lint-results-*.html
          retention-days: 7

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :androidApp:testPlaystoreDebugUnitTest --no-daemon
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: android-unit-test-results
          path: androidApp/build/reports/tests/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: androidApp/build/reports/kover/report.xml
          flags: android
          fail_ci_if_error: false

  build-apk:
    name: Build APKs (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [lint, unit-tests]

    strategy:
      matrix:
        flavor: [playstore, github]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ${{ matrix.flavor }} Debug APK
        run: ./gradlew :androidApp:assemble${{ matrix.flavor == 'playstore' && 'Playstore' || 'Github' }}Debug --no-daemon
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Rename APK for release
        run: |
          mkdir -p release-apks
          cp androidApp/build/outputs/apk/${{ matrix.flavor }}/debug/*.apk \
             release-apks/bilbo-${{ matrix.flavor }}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bilbo-${{ matrix.flavor }}-debug-apk
          path: release-apks/bilbo-${{ matrix.flavor }}-debug.apk
          retention-days: 14

  attach-release-artifacts:
    name: Attach APKs to GitHub Release
    runs-on: ubuntu-latest
    needs: [build-apk]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Playstore APK
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bilbo-playstore-debug-apk
          path: release-apks/

      - name: Download GitHub APK
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bilbo-github-debug-apk
          path: release-apks/

      - name: List downloaded APKs
        run: ls -la release-apks/

      - name: Attach APKs to release ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            release-apks/bilbo-playstore-debug.apk \
            release-apks/bilbo-github-debug.apk \
            --clobber
