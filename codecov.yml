codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "100...100"
  status:
    project:
      default:
        target: 100%
        threshold: 0%
    patch:
      default:
        target: 100%
        threshold: 0%

comment:
  layout: "reach,diff,flags,files"

flags:
  shared:
    paths:
      - shared/src/commonMain/
  android:
    paths:
      - androidApp/src/main/

component_management:
  default_rules:
    statuses:
      - type: project
        target: 100%
        threshold: 0%
      - type: patch
        target: 100%
        threshold: 0%
  individual_components:
    - component_id: shared
      name: shared
      paths:
        - shared/src/commonMain/
    - component_id: android
      name: android
      paths:
        - androidApp/src/main/

# The iOS leg (iosApp/, shared iosMain) and the Supabase Deno backend are built
# on macOS / Deno runners; their coverage is uploaded under the ios/deno flags
# defined in .coverage-thresholds.json and is not produced by the Linux verify run.
