# Supabase project configuration for Spark
# Reference: https://supabase.com/docs/guides/local-development/cli/config

[project]
id = "spark"

[api]
# Port for the local Supabase API (PostgREST)
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
# Port for the local PostgreSQL database
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
# IP version for the realtime server
ip_version = "IPv6"
max_header_length = 4096

[studio]
enabled = true
# Port for Supabase Studio
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
# Local email testing (for auth emails)
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# URL of the local Supabase Auth server
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "spark://auth/callback",
  "exp://127.0.0.1:8081/--/auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
password_requirements = ""

[auth.rate_limit]
# Rate limits for auth operations (requests per 5 minutes unless noted)
token_refresh = 150
sign_in_sign_ups = 30
anonymous_users = 30
otp = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 6
otp_expiry = 3600

[auth.email.smtp]
# Configure via environment variables in production
host = "supabase-mail"
port = 2500
user = "fake@example.com"
pass = "fake"
admin_email = "admin@example.com"
sender_name = "Spark"

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your Spark verification code is {{ .Code }}"

[auth.external.apple]
enabled = false
client_id = ""
secret = "env(AUTH_EXTERNAL_APPLE_SECRET)"
redirect_uri = ""

[auth.external.google]
enabled = false
client_id = "env(AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(AUTH_EXTERNAL_GOOGLE_SECRET)"
skip_nonce_check = false

# ============================================================
# Edge Functions configuration
# Each function can override its verify_jwt setting
# ============================================================

[functions.create-invite]
verify_jwt = true

[functions.accept-invite]
verify_jwt = true

[functions.send-nudge]
verify_jwt = true

[functions.sync-status]
verify_jwt = true

[functions.create-circle]
verify_jwt = true

[functions.join-circle]
verify_jwt = true

[functions.create-challenge]
verify_jwt = true

[functions.compute-leaderboard]
verify_jwt = true

# generate-digest is called by cron — JWT verification handled inside the function
[functions.generate-digest]
verify_jwt = false

[functions.ai-weekly-insight]
verify_jwt = true

# ============================================================
# Analytics
# ============================================================

[analytics]
enabled = false
port = 54327
vector_port = 54328
backend = "postgres"
